services:
  postgres:
    image: postgres:15-alpine
    container_name: menu-postgres
    environment:
      POSTGRES_USER: menu
      POSTGRES_PASSWORD: menu123
      POSTGRES_DB: menu_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: menu-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
